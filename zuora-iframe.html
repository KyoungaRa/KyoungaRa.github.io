          <script nonce="" type="text/javascript">
              /**
              * ZSL stands for Zuora Security Lib. It manages the load of HPM2Security js lib.
              */
              ZSL = (function() {
                  var HPM_SECURITY_LIB_URL = 'https://cdn.zuora.com/@billing-ui/370.1.0/Hosted/lite2/js/HPM2Security-min.js';
                  // wait interval in ms while waiting the lib load result.
                  var WAIT_INTERVAL = 100;
                  // max time to wait
                  var MAX_WAIT_TIME = 3000;
                  // flag to indicate if the lib is loaded.
                  var isSecurityLibLoaded = false;
                  // flag to indicate if it is loading(not finished yet) the lib.
                  var isSecurityLibLoading = false;
  
                  function loadHpmSecurityLib(successHandler, failureHandler) {
                      // Ensure the JS is loaded only once.
                      if (isSecurityLibLoaded) {
                          successHandler();
                          return;
                      }
  
                      isSecurityLibLoading = true;
  
                      // Get the nonce from an existing script tag
                      const nonce = document.querySelector('script[nonce]')?.getAttribute('cspNonce');
  
                      // Create a new script element
                      const script = document.createElement("script");
                      script.src = HPM_SECURITY_LIB_URL;
                      if (nonce) {
                          script.nonce = nonce; // Apply the nonce if found
                      }
  
                      script.onload = function() {
                          isSecurityLibLoaded = true;
                          isSecurityLibLoading = false;
                          if (successHandler) {
                              successHandler();
                          }
                          console.info("[INFO] HPM security lib is loaded.");
                      };
  
                      script.onerror = function() {
                          isSecurityLibLoaded = false;
                          isSecurityLibLoading = false;
                          if (failureHandler) {
                              failureHandler();
                          }
                          console.error("[ERROR] Unable to load HPM security lib from " + HPM_SECURITY_LIB_URL);
                      };
  
                      // Append the script to the document head
                      document.head.appendChild(script);
                  }
  
                  function runAfterHpmSecurityLibLoaded(successHandler, failureHandler) {
                      if (isSecurityLibLoading){
                          console.info(">>> HPM security lib is under loading...")
                          var waitOptions = arguments[2] || {};
                          if (typeof waitOptions.startTime == "undefined") {
                              waitOptions.startTime = Date.now();
                          }
  
                          if (Date.now() - waitOptions.startTime > MAX_WAIT_TIME) {
                              console.info(">>> Reloading HPM security lib ...")
                              loadHpmSecurityLib(successHandler, failureHandler);
                          } else {
                              setTimeout(function() {
                                  runAfterHpmSecurityLibLoaded(successHandler, failureHandler, waitOptions);
                              }, WAIT_INTERVAL);
                          }
                      } else {
                          loadHpmSecurityLib(successHandler, failureHandler);
                      }
                  }
  
                  return {
                      runAfterHpmSecurityLibLoaded: runAfterHpmSecurityLibLoaded
                  }
              })();

              var field = getField(type);

  function validateRestrictedField(field) {
      var restricted = ["creditCardNumber","cardSecurityCode","bankAccountNumber","creditCardExpirationYear","creditCardExpirationMonth","bankAccountName"];

  function pickValue(data){
      var start = data.indexOf("(");
      var end = data.indexOf(")");
      if(start<0 || end<0){
          return '';
      }
      var val = data.substring(start+1,end);
      val = val.replace(" ","");
      return val;
  }    
  
  function getField(data){
      var start = data.indexOf("(");
      var end = data.indexOf(")");
      if(start<0 || end<0){
          return '';
      }
      var val = data.substring(start+1,end);
      
      var index = val.indexOf(":");
      
      if(index<0) {
          return '';
      }
      var field = val.substring(0,index);
      field = field.replace(" ","");
      return field;

      var isAmericanExpressCard = number.match("^(34|37)");

      var newInput;

      } else {
        newInput = addSpaces(number, defaultSpaces);
      }
      
      return newInput;

  function addSpaces(number, spaces) {
      var parts = []
      var j = 0;
      for (var i=0; i<spaces.length; i++) {
        if (number.length > spaces[i]) {
          parts.push(number.slice(j, spaces[i]));
          j = spaces[i];
        } else {
          if (i < spaces.length) {
            parts.push(number.slice(j, spaces[i]));
          } else {
            parts.push(number.slice(j));
          }
          break;
        }
      }
  
      if (parts.length > 0) {
        return parts.join(" ");
      } else {
        return number;
      }
  }

                  var o = obj.find('*');
  
                  // get list of focusable items
                  var focusableItems;
                  focusableItems = o.filter(focusableElementsString).filter(':visible')
  
                  // get currently focused item

                  // get the number of focusable items
                  var numberOfFocusableItems;
                  numberOfFocusableItems = focusableItems.length
  
                  // get the index of the currently focused item
                  var focusedItemIndex;
                  focusedItemIndex = focusableItems.index(focusedItem);
  
                  if (evt.shiftKey) {
                      //back tab
                      // if focused on first item and user preses back-tab, go to the last focusable item
                      if (focusedItemIndex == 0) {
                          focusableItems.get(numberOfFocusableItems - 1).focus();
                          evt.preventDefault();
                      }
  
                  } else {
                      //forward tab
                      // if focused on the last item and user preses tab, go to the first focusable item

  var ZVF = function() {
      var KEY_ERROR = "error";
      var CODE_MISSING_REQUIRED_FIELD = "001";
      var CODE_INVALID_CARD_NUM = "002";
      var CODE_INVALID_CARD_TYPE = "003";
      var CODE_INVALID_CVV_NUM = "004";
      var CODE_BLOCKED_CITY = "005";
      var CODE_INVALID_NUMBER = "006";
      var CODE_FAIL_TO_VALIDATE_CAPTCHA = "007";
      var CODE_BIN_BLACKLISTED = "008";
      var CODE_INVALID_CARD_HOLDER_NAME = "009";
      var CODE_INVALID_VPA = "010";
      var CODE_UNKNOWN = "unknown";
  
      var invalidCCNumMsg = "Invalid Card Number";
      var invalidCCTypeMsg = "Invalid Card Type";
      var invalidCVV="Invalid CVV Number";
      var requiredFieldMsg="Required Field Not Completed";
      var invalidNumberMsg = "Invalid number value.";
      var cityBlockedMsgDefault = "The city is not allowed."
      var blacklistedBinMsgDefault = "Card number not allowed. Please use a different payment method.";
      var invalidCCHolderNameMsgDefault = "Invalid Credit Card holder name.";
      var cityBlockedMsg="???page.message.creditCard.cityBlocked???";
      var blacklistedBinMsg="???page.message.creditCard.blacklistedBin???";
      var invalidCCHolderNameMsg="???page.message.creditCard.invalidCreditCardHolderName???";
      var invalidVPAMsg = "VPA format must not include special characters or spaces and must be submitted in a <username>@<handle> format.";
      if (cityBlockedMsg == "???page.message.creditCard.cityBlocked???") {
          cityBlockedMsg = cityBlockedMsgDefault;
      }
      if (blacklistedBinMsg == "???page.message.creditCard.blacklistedBin???") {
          blacklistedBinMsg = blacklistedBinMsgDefault;
      }
       if (invalidCCHolderNameMsg == "???page.message.creditCard.invalidCreditCardHolderName???") {
          invalidCCHolderNameMsg = invalidCCHolderNameMsgDefault;
      }
  
      /*
       * PAY-7882: Save the first error field key.
       * Used to focus on first error field after validation.
       * It will be set null before validation, and after focusing.
       */
      var firstErrorFieldKey = null;
  
      var cityBlackListStr = '';
      var cityWhiteListStr = '';
      function buildCountryToCitiesMap(mappingConfig) {
          var countryToCitiesMap = {};
          if (!mappingConfig) {
              return countryToCitiesMap;
          }
          var countryToCitiesList = mappingConfig.toUpperCase().split(";");
          countryToCitiesList.forEach(function(countryToCitiesMapConfig) {
              if (!countryToCitiesMapConfig) {
                  return;
              }
              var configEntry = countryToCitiesMapConfig.split("=");
              var countryCode = configEntry[0];
              var cityNames = configEntry[1];
              if (!countryCode) {
                  return;
              }
  
              var citySet = {};
              if (cityNames) {
                  cityNames.split(",").forEach(function (cityName) {
                      if (!cityName) {
                          return;
                      }
                      citySet[cityName] = true;
                  });
              }
              countryToCitiesMap[countryCode] = citySet;
          });
          return countryToCitiesMap;
      }
  
      var countryCityBlackListMap = buildCountryToCitiesMap(cityBlackListStr);
      var countryCityWhiteListMap = buildCountryToCitiesMap(cityWhiteListStr);
  
      function isBlockedCreditCardCity(countryCode, cityName) {
          if (!countryCode || !cityName) {
              return false;
          }
          var normalizedCityName = cityName.trim().toUpperCase();
          // check white list
          var cityWhiteListSet = countryCityWhiteListMap[countryCode];
          if (cityWhiteListSet) {
              return !Boolean(cityWhiteListSet[normalizedCityName]);
          }
  
          // check black list
          var cityBlackListSet = countryCityBlackListMap[countryCode];
          if (cityBlackListSet) {
              return Boolean(cityBlackListSet[normalizedCityName]);
          }
  
          return false;
      }
  
      function parseFieldKeyByFieldName(fieldName) {
          var fieldNamePattern = /^field_([a-zA-Z0-9]+)$/;
          var matches;
          if (fieldName && (matches=fieldNamePattern.exec(fieldName)) != null) {
              return matches[1];
          }
  
          return KEY_ERROR;
      }
  
      function parseGroupKeyByGroupId(groupId) {
          var groupIdPattern = /^form-group-([_a-zA-Z0-9]+)$/;
          var matches;
          if (groupId && (matches=groupIdPattern.exec(groupId)) != null) {
              return matches[1];
          }
  
          return undefined;
      }
  
      /**************************************************************************
       * Following function are utilities to locate dom elements based on following
       * assumption. Each fields are wrapped in a dom structure as below:
       * + div.form-group         (1)
       *      |- label.form-label (2)
       *      |- div.form-element (3)
       *      |- a.tooltip        (4)
       *      |- div.error-field  (5)
       *
       * (1) The top level container of an HPM field
       * (2) The label for this field
       * (3) The container to hold the real input, select etc. If this field is
       *     required, it has "required" class.
       * (4) The tooltip for this field.
       * (5) The area to display validation error for this field.
       **************************************************************************/
      function findAllFormElements() {
          return jQuery("div.form-element");
      }
  
      function locateFieldElementsByKey(fieldKey) {
          return jQuery("input[type!='hidden'], select").filter("[name='field_" + fieldKey + "']");
      }
  
      function locateFormGroupByFieldKey(fieldKey) {
          return locateFieldElementsByKey(fieldKey).parents("div.form-group");
      }
  
      function locateFormGroupByFieldContainer(fieldContainer) {
          return fieldContainer.parent("div.form-group");
      }
  
      function locateFieldContainerByFieldKey(fieldKey) {
          return locateFieldElementsByKey(fieldKey).parents("div.form-group");
      }
  
      function locateLabelElement(formGroup) {
          return formGroup.children("label.form-label");
      }
  
      function locateFieldContainer(formGroup) {
          return formGroup.children("div.form-element");
      }
  
      function locateMessageBox(formGroup) {
          return formGroup.children("div.error-field");
      }
  
      function locateGeneralErrorBox() {
          return jQuery("#error");
      }
  
      function setAriaInvalidFlag(element) {
          element.attr("aria-invalid", true);
      }
  
      function clearAriaInvalidFlag(element) {
          element.attr("aria-invalid", false);
      }
  
      function getFieldKeyByElement(fieldElement) {
          return parseFieldKeyByFieldName(fieldElement.attr("name"));
      }
  
      function getFieldKeyByGroup(formGroup) {
          return parseGroupKeyByGroupId(formGroup.attr("id"));
      }
  
      function hasRequiredFlag(fieldContainer) {
          return fieldContainer.hasClass("required")
      }
  
      function isBlankString(value) {
          return !value || !value.trim();
      }
  
      function checkIfAllowedCreditCardCity(labelElement, fieldElement) {
          var fieldKey = getFieldKeyByElement(fieldElement);
          var cityName = fieldElement.val();
          var countryCode = locateFieldElementsByKey("creditCardCountry").val();
  
          if (isBlockedCreditCardCity(countryCode, cityName)) {
              return {
                  key: fieldKey,
                  code: CODE_BLOCKED_CITY,
                  message: cityBlockedMsg
              };
          }
      }
  
      function checkIfPureNumberValue(labelElement, fieldElement, required) {
          var fieldKey = getFieldKeyByElement(fieldElement);
          var value = fieldElement.val();
  
          if (!required && isBlankString(value)) {
              return;
          }
  
          if (!/^\d+$/.test(value)) {
              setAriaInvalidFlag(fieldElement);
              return {
                  key: fieldKey,
                  code: CODE_INVALID_NUMBER,
                  message: invalidNumberMsg
              };
          }
      }
  
      function checkIfValidCreditCardNumber(labelElement, fieldElement, required) {
          var fieldKey = getFieldKeyByElement(fieldElement);
          var creditCardNumber = fieldElement.val().replace(/[^\d]/g, "");
          var error;
  
          if (!required && isBlankString(creditCardNumber)) {
              return;
          }
  
          // check if credit card number is valid
          if (!isCreditCard(creditCardNumber)) {
              error = {
                  key: fieldKey,
                  code: CODE_INVALID_CARD_NUM,
                  message: invalidCCNumMsg
              };
          }
  
          // check if the card type is supported.
          var detectedCardType;
          if (detectedCardType = determineCardType(creditCardNumber)) {
              var selectedCardType;
              var creditCardTypeElements = locateFieldElementsByKey("creditCardType");
              if (creditCardTypeElements.length > 0) {
                  selectedCardType = getRadioCheckedValue(creditCardTypeElements);
              }
              // report error when selected card type does not match the detected card type.
              if (selectedCardType && selectedCardType != detectedCardType) {
                  error = {
                      key: fieldKey,
                      code: CODE_INVALID_CARD_TYPE,
                      message: invalidCCTypeMsg
                  }
              }
          } else {
              error = {
                  key: fieldKey,
                  code: CODE_INVALID_CARD_TYPE,
                  message: invalidCCTypeMsg
              }
          }
  
          if (isBlacklistedBinsEnabled && isCardNumberBlacklisted(creditCardNumber)) {
              error = {
                  key: fieldKey,
                  code: CODE_BIN_BLACKLISTED,
                  message: blacklistedBinMsg
              };
          }
  
          if (error) {
              setAriaInvalidFlag(fieldElement);
              return error;
          }
      }
  
      function checkIfMissingRequiredValue(labelElement, fieldElement, required) {
          if (!required) {
              return;
          }
  
          var label = labelElement.text().trim();
          var fieldKey = getFieldKeyByElement(fieldElement);
          var value = fieldElement.val();
  
          if (isBlankString(value)) {
              setAriaInvalidFlag(fieldElement);
              return {
                  key: fieldKey,
                  code: CODE_MISSING_REQUIRED_FIELD,
                  message: requiredFieldMsg.replace("#fieldName", label)
              };
          }
      }
  
      function getRadioCheckedValue(fieldElements) {
          var value;
          fieldElements.each(function() {
              var fieldElement = jQuery(this);
              if (fieldElement.prop( "checked" )) {
                  value = fieldElement.val();
                  return false;
              }
          });
  
          return value;
      }
  
      function checkIfNoneRadioChecked(labelElement, fieldElements) {
          var label = labelElement.text().trim();
          var fieldKey = getFieldKeyByElement(fieldElements);
          var value = getRadioCheckedValue(fieldElements);
  
          if (!value) {
              setAriaInvalidFlag(locateFieldContainerByFieldKey(fieldKey));
              return {
                  key: fieldKey,
                  code: CODE_MISSING_REQUIRED_FIELD,
                  message: requiredFieldMsg.replace("#fieldName", label)
              }
          }
      }
  
      function validateDateField(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElements = fieldContainer.find("select");
          var labelElement = locateLabelElement(formGroup);
  
          // skip validation if no form field is found.
          if (!fieldElements.length) {
              return;
          }
  
          // clear the validation flag.
          fieldElements.each(function() {
              clearAriaInvalidFlag(jQuery(this));
          });
  
          var error;
          fieldElements.each(function() {
              if (error = checkIfMissingRequiredValue(labelElement, jQuery(this), hasRequiredFlag(fieldContainer))) {
                  return false;
              }
          });
  
          return error;
      }
  
      function validateCreditCardType(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElements = fieldContainer.find("input[type=radio]");
          var labelElement = locateLabelElement(formGroup);
  
          // skip validation if no form field is found.
          if (!fieldElements.length) {
              return;
          }
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldContainer);
          if (hasRequiredFlag(fieldContainer)) {
              return checkIfNoneRadioChecked(labelElement, fieldElements);
          }
      }
  
      function validateCreditCardNumber(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElement = fieldContainer.find("input[type!=hidden]");
          var labelElement = locateLabelElement(formGroup);
  
          // PAY-13730: when reauthenticate a credit card, there is not an input.
          if (!fieldElement.length) {
              return;
          }
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldElement);
          var error;
          if (error = checkIfMissingRequiredValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              return error;
          }
  
          if (error = checkIfValidCreditCardNumber(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              return error;
          }
      }
  
      function validateCreditCardSecurityCode(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElement = fieldContainer.find("input[type!=hidden]");
          var labelElement = locateLabelElement(formGroup);
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldElement);
          var error;
          if (error = checkIfMissingRequiredValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              return error;
          }
  
          if (error = checkIfPureNumberValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              // use specific error code and message for CVV
              error.code = CODE_INVALID_CVV_NUM;
              error.message = invalidCVV;
              return error;
          }
      }
  
      function validateCreditCardCity(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElement = fieldContainer.find("input[type!=hidden]");
          var labelElement = locateLabelElement(formGroup);
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldElement);
          var error;
          if (error = checkIfMissingRequiredValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              return error;
          }
  
          if (error = checkIfAllowedCreditCardCity(labelElement, fieldElement)) {
              return error;
          }
      }
  
  
      function validateCreditCardHolderName(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElement = fieldContainer.find("input[type!=hidden]");
          var labelElement = locateLabelElement(formGroup);
  
          if (!fieldElement.length) {
              return;
          }
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldElement);
          var error;
          if (error = checkIfMissingRequiredValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer))) {
              return error;
          }
  
          if (error = checkIfAllowedCardHolderName(labelElement, fieldElement)) {
              return error;
          }
      }
  
      function checkIfAllowedCardHolderName(labelElement, fieldElement) {
          var fieldKey = getFieldKeyByElement(fieldElement);
          if (!isCardHolderNameValidationEnabled) {
              return;
          }
  
          var cardHolderName = fieldElement.val().replace(/[^\d]/g, "");
          if (isBlankString(cardHolderName)) {
              return;
          }
  
          if (isCreditCard(cardHolderName)) {
              return {
                  key: fieldKey,
                  code: CODE_INVALID_CARD_HOLDER_NAME,
                  message: invalidCCHolderNameMsg
              };
          }
      }
  
      function checkIfValidVPA(labelElement, fieldElement, required) {
          if (!fieldElement) {
              return;
          }
  
          const fieldKey = getFieldKeyByElement(fieldElement);
          const vpaValue = fieldElement.val();
          let error;
  
          if (!required && isBlankString(vpaValue)) {
              return;
          }
  
          // UPI ID validation regex pattern
          // Format: username@bankname (e.g., user123@paytm, john.doe@okaxis)
  
          const userPart = '[A-Za-z0-9._-]+';
          const handleLabel = '(?:[A-Za-z0-9](?:[A-Za-z0-9-]*[A-Za-z0-9])?)';
          const handlePart = handleLabel + '(?:\\.' + handleLabel + ')*';
          const upiRegex = new RegExp('^' + userPart + '@' + handlePart + '$', 'i');
  
          if (!upiRegex.test(vpaValue)) {
              error = {
                  key: fieldKey,
                  code: CODE_INVALID_VPA,
                  message: invalidVPAMsg
              };
              setAriaInvalidFlag(fieldElement);
          }
  
          return error;
      }
  
      function validateVPA(formGroup) {
          const fieldContainer = locateFieldContainer(formGroup);
          const fieldElement = fieldContainer.find("input[type!=hidden]");
          const labelElement = locateLabelElement(formGroup);
  
          // skip validation if no form field is found.
          if (!fieldElement.length) {
              return;
          }
  
          // clear the validation flag.
          clearAriaInvalidFlag(fieldElement);
  
          const error = checkIfMissingRequiredValue(labelElement, fieldElement, hasRequiredFlag(fieldContainer)) ||
                        checkIfValidVPA(labelElement, fieldElement, hasRequiredFlag(fieldContainer));
          if (error) {
              return error;
          }
      }
  
      function validateCommonField(formGroup) {
          var fieldContainer = locateFieldContainer(formGroup);
          var fieldElement = fieldContainer.find("input[type!=hidden][name^=field_], select[name^=field_]");
          var labelElement = locateLabelElement(formGroup);
  
          // skip validation if no form field is found.
          if (!fieldElement.length) {
              return;

  var ZCRT = function() {
      var public_key_template="-----BEGIN PUBLIC KEY-----\n$K-----END PUBLIC KEY-----";
  
      return {
          certParser:function(cert) {
                var lines = cert.split('\n');
                var read = false;
                var b64 = false;
                var end = false;
                var flag = '';
                var retObj = {};
                retObj.info = '';
                retObj.salt = '';
                retObj.iv;
                retObj.b64 = '';
                retObj.aes = false;
                retObj.mode = '';
                retObj.bits = 0;
                for(var i=0; i< lines.length; i++) {
                    flag = lines[i].substr(0,9);
                  if(i==1 && flag != 'Proc-Type' && flag.indexOf('M') == 0)//unencrypted cert?
                    b64 = true;
                  switch(flag){
                    case '-----BEGI':
                      read = true;
                      break;
                    case 'Proc-Type':
                      if(read)
                        retObj.info = lines[i];
                      break;
                    case 'DEK-Info:':
                      if(read){
                        var tmp = lines[i].split(',');
                        var dek = tmp[0].split(': ');
                        var aes = dek[1].split('-');
                        retObj.aes = (aes[0] == 'AES')?true:false;
                        retObj.mode = aes[2];
                        retObj.bits = parseInt(aes[1]);
                        retObj.salt = tmp[1].substr(0,16);
                        retObj.iv = tmp[1];
                      }
                      break;
                    case '':
                      if(read)
                        b64 = true;
                      break;
                    case '-----END ':
                      if(read){
                        b64 = false;
                        read = false;
                      }
                    break;
                    default:
                      if(read && b64)
                        retObj.b64 += pidCryptUtil.stripLineFeeds(lines[i]);
                  }
                }
                return retObj;
          },
  
          encrypt: function(iframed){
              // Concat the encrypted fields's name
              var encrypted_fields = "";
              var encrypted_values = "";
  
              jQuery("input[encrypt='true']").each(function() {
                  encrypted_fields = encrypted_fields + "#" + jQuery(this).prop('name');
                  // remvoe extra blank space before encryption (Except bankAccountName field)
                  var fieldName = jQuery(this).prop('name');
                  if(fieldName.indexOf("bankAccountName") < 0){
                      encrypted_values = encrypted_values + "#" + jQuery(this).val().replace(/ /g,"");
                  }else{
                      encrypted_values = encrypted_values + "#" + jQuery(this).val();
                  }
              });
  
              jQuery("select[encrypt='true']").each(function() {
                  encrypted_fields = encrypted_fields + "#" + jQuery(this).prop('name');
                  encrypted_values = encrypted_values + "#" + jQuery(this).val();
              });
  
              var encKey = jQuery("input[name='field_key']")[0].value;
              if(encrypted_fields.length > 0) {
                  jQuery("input[id='encrypted_fields']").val(encrypted_fields);
                  if(!disableHPMEncryption) {
                      console.info("HPM encryption is enabled.");
                      // encrypt required.
                      jQuery("input[id='encrypted_values']").val(ZCRT.encryptText(encrypted_values, encKey));
                  }else{
                      console.warn("HPM encryption is disabled.");
                      // no encrypt required.
                      jQuery("input[id='encrypted_values']").val(encrypted_values);
                  }
              }
  
              if(iframed) {
                  return ;
              }else{
                  // Get the parameters as an array
                  var values = jQuery('#HostedPageForm').serializeArray();
                  jQuery.each(values, function( i, field ) {
                      var fieldName = field.name;
                      if(encrypted_fields.indexOf(fieldName)>-1) {
                          // scratch the encrypted fields
                          field.value = '';
                      }
                  });
                  // Convert to URL-encoded string
                  var fValues = jQuery.param(values);
  
                  return fValues;
              }
          },
  
          encryptText: function (text,key) {
              try{
                 if(key) {
                     var public_key_1024;
                     if(key.indexOf("-----BEGIN")>-1){
                         public_key_1024= key;
                     }else {
                         public_key_1024= public_key_template.replace('$K',key);
                     }
  
                    /*-----------------------------------------------------------*
                     * ENCRYPT: RSA 4098 bit                                     *
                     *-----------------------------------------------------------*/
                     var params = ZCRT.certParser(public_key_1024);
                     var key = pidCryptUtil.decodeBase64(params.b64);
                     var rsa = new pidCrypt.RSA();
  
  
                     // ASN1 parsing
                       var asn = pidCrypt.ASN1.decode(pidCryptUtil.toByteArray(key));
  
                     var tree = asn.toHexTree();
  
                     // setting the public key for encryption with retrieved ASN.1 tree
                     rsa.setPublicKeyFromASN(tree);
  
                     /*** encrypt */
                     var crypted = rsa.encrypt(text);
  
                     var fromHex = pidCryptUtil.encodeBase64(pidCryptUtil.convertFromHex(crypted));
  
                     var ciphertext = pidCryptUtil.fragment(fromHex,64);
                     //alert('$$$ '+ciphertext);
                     return ciphertext;
                  } else {
                     console.warn("It is unable to process this page due to a temporary security issue. Please try it later.");
                     return "";
                 }
              }catch(e){
                  console.error("It is unable to process this page due to a temporary security issue. Please try it later.");
                  return "";
              }
          }
      };
  }();
